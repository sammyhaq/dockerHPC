---
- name: Generate munge key on controller
  hosts: controllers
  become: yes
  tasks:
    - name: Generate munge key to shared location
      ansible.builtin.shell: |
        dd if=/dev/urandom bs=1 count=1024 > /home/.munge.key 2>/dev/null
        chmod 644 /home/.munge.key
      args:
        creates: /home/.munge.key


- name: Configure munge on all nodes
  hosts: all
  become: yes
  tasks:
    - name: Create munge directories
      ansible.builtin.file:
        path: "{{ item }}"
        state: directory
        owner: munge
        group: munge
        mode: '0755'
      loop:
        - /etc/munge
        - /var/log/munge
        - /var/run/munge

    - name: Copy munge key from shared location
      ansible.builtin.copy:
        src: /home/.munge.key
        dest: /etc/munge/munge.key
        remote_src: yes
        owner: munge
        group: munge
        mode: '0400'

    - name: Start munge daemon
      ansible.builtin.shell: |
        munged --force
      args:
        creates: /var/run/munge/munged.pid
